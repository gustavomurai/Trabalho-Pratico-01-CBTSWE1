<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Funcionário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding-top: 50px; padding-bottom: 70px; }
        .card { border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .card-header { background-color: #3498db; color: white; font-weight: bold; }
        .footer { background-color: #343a40; color: white; text-align: center; padding: 20px 0; position: fixed; bottom: 0; width: 100%; }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <a href="ViewServlet" class="btn btn-secondary mb-3">Visualizar Funcionários</a>
            
            <div class="card">
                <div class="card-header">
                    <h3>Adicionar Novo Funcionário</h3>
                </div>
                <div class="card-body">
                    <form action="SaveServlet" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label">Nome:</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Senha:</label>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email:</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="country" class="form-label">País:</label>
                            <select class="form-select" id="country" name="country">
                                <option>Brasil</option>
                                <option>EUA</option>
                                <option>Reino Unido</option>
                                <option>Outro</option>
                            </select>
                        </div>
                        <button type="submit" class="btn btn-success w-100">Salvar Funcionário</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="container">
        projeto realizado por Gustavo Murai e Igor Murai para a materia de Sistemas Web 1
    </div>
</div>

</body>
</html>
